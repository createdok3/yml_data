name: Universal Offline Package Fetcher
on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'Package to download (e.g., uvicorn, rich, fastapi)'
        required: true
        default: 'requests'
      python_version:
        description: 'Python version (e.g., 3.10, 3.11)'
        required: true
        default: '3.10'
      os_type:
        description: 'OS Platform Tag (e.g., win_amd64, manylinux2014_x86_64)'
        required: true
        default: 'win_amd64'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Specific Python Version
        uses: actions/setup-python@v5
        with:
          python-version: '${{ github.event.inputs.python_version }}'

      - name: Create Payload Directory
        run: mkdir -p payload/offline_packages

      - name: Download Target Package
        run: |
          python -m pip install --upgrade pip
          pip download ${{ github.event.inputs.package_name }} -d payload/offline_packages --platform ${{ github.event.inputs.os_type }} --only-binary=:all:

      - name: Upload Dynamic Offline Bundle
        uses: actions/upload-artifact@v4
        with:
          name: offline-${{ github.event.inputs.package_name }}-${{ github.event.inputs.os_type }}
          path: payload/
          retention-days: 1
